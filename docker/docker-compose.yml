version: '3.8'

services:
  voxcpm-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: voxcpm-server:latest
    container_name: voxcpm-tts
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - voxcpm-models:/app/models
      - ./config.yaml:/app/docker/config.yaml:ro
    environment:
      - VOXCPM_CONFIG_PATH=/app/docker/config.yaml
      - NVIDIA_VISIBLE_DEVICES=all
      - MODEL_ID=${MODEL_ID:-openbmb/VoxCPM2}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 60s
      retries: 3
      start_period: 300s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

volumes:
  voxcpm-models:
    name: voxcpm-models-cache
