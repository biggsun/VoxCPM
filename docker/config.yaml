server:
  host: "0.0.0.0"
  port: 8000
  workers: 1

model:
  model_id: "openbmb/VoxCPM2"
  cache_dir: "/app/models"
  load_denoiser: false
  optimize: true

audio:
  sample_rate: 48000
  default_voice: "default"
  default_speed: 1.0
  default_language: "Auto"
  seed: 42

voices:
  reference_dir: "/app/voices"
  supported_extensions:
    - ".wav"
    - ".mp3"
    - ".flac"
    - ".ogg"

languages:
  - "Auto"
  - "Arabic"
  - "Burmese"
  - "Chinese"
  - "Danish"
  - "Dutch"
  - "English"
  - "Finnish"
  - "French"
  - "German"
  - "Greek"
  - "Hebrew"
  - "Hindi"
  - "Indonesian"
  - "Italian"
  - "Japanese"
  - "Khmer"
  - "Korean"
  - "Lao"
  - "Malay"
  - "Norwegian"
  - "Polish"
  - "Portuguese"
  - "Russian"
  - "Spanish"
  - "Swahili"
  - "Swedish"
  - "Tagalog"
  - "Thai"
  - "Turkish"
  - "Vietnamese"

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"